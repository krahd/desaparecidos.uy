<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="620" viewBox="0 0 1300 620" role="img" aria-label="Stage 1 data flow">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#111" /></marker>
    <style>.title{font-family:Arial,Helvetica,sans-serif;font-size:30px;font-weight:700;fill:#111}.label{font-family:Arial,Helvetica,sans-serif;font-size:19px;font-weight:700;fill:#111}.body{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#111}.box{fill:#f8f8f8;stroke:#111;stroke-width:2;rx:14;ry:14}.gate{fill:#fff;stroke:#111;stroke-width:2;stroke-dasharray:7 5;rx:14;ry:14}.line{stroke:#111;stroke-width:2;fill:none;marker-end:url(#arrow)}.small{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#111}</style>
  </defs>
  <rect x="24" y="24" width="1252" height="572" fill="white" stroke="#111" stroke-width="2"/>
  <text x="55" y="70" class="title">Stage 1 prototype: accountable place-fragment reconstruction</text>
  <text x="55" y="100" class="body">The pipeline foregrounds review, provenance, bounded acquisition, and deterministic assembly.</text>
  <rect x="55" y="155" width="175" height="110" class="box"/><text x="80" y="188" class="label">Target manifest</text><text x="80" y="216" class="body">public portrait</text><text x="80" y="238" class="small">source and provenance</text>
  <rect x="55" y="355" width="175" height="110" class="box"/><text x="80" y="388" class="label">Place sources</text><text x="80" y="416" class="body">streets and surfaces</text><text x="80" y="438" class="small">curated visual field</text>
  <rect x="290" y="155" width="190" height="110" class="gate"/><text x="320" y="188" class="label">Review gate</text><text x="320" y="216" class="body">approved rows only</text><text x="320" y="238" class="small">no automatic ingestion</text>
  <rect x="290" y="355" width="190" height="110" class="gate"/><text x="320" y="388" class="label">Quality gate</text><text x="320" y="416" class="body">remove unsuitable material</text><text x="320" y="438" class="small">deduplication and heuristics</text>
  <rect x="540" y="255" width="190" height="110" class="box"/><text x="570" y="288" class="label">Fragment extraction</text><text x="570" y="316" class="body">tiles from approved sources</text><text x="570" y="338" class="small">caps and reuse limits</text>
  <rect x="790" y="255" width="190" height="110" class="box"/><text x="820" y="288" class="label">Deterministic matching</text><text x="820" y="316" class="body">nearest-fragment assembly</text><text x="820" y="338" class="small">not synthetic restoration</text>
  <rect x="1040" y="155" width="190" height="110" class="box"/><text x="1070" y="188" class="label">Still output</text><text x="1070" y="216" class="body">fragmentary image</text><text x="1070" y="238" class="small">review before release</text>
  <rect x="1040" y="355" width="190" height="110" class="box"/><text x="1070" y="388" class="label">Sidecar + video</text><text x="1070" y="416" class="body">metadata and process</text><text x="1070" y="438" class="small">parameters and review</text>
  <line x1="230" y1="210" x2="290" y2="210" class="line"/><line x1="230" y1="410" x2="290" y2="410" class="line"/><line x1="480" y1="210" x2="560" y2="265" class="line"/><line x1="480" y1="410" x2="560" y2="355" class="line"/><line x1="730" y1="310" x2="790" y2="310" class="line"/><line x1="980" y1="310" x2="1040" y2="210" class="line"/><line x1="980" y1="310" x2="1040" y2="410" class="line"/>
  <text x="55" y="540" class="body">Boundary: the system is designed to avoid evidentiary authority, identity inference, and seamless completion.</text>
</svg>
