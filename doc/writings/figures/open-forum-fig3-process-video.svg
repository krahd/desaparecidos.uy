<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="520" viewBox="0 0 1300 520" role="img" aria-label="Process video sequence">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#111" /></marker><style>.title{font-family:Arial,Helvetica,sans-serif;font-size:30px;font-weight:700;fill:#111}.label{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#111}.body{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#111}.frame{fill:#f7f7f7;stroke:#111;stroke-width:2;rx:12;ry:12}.screen{fill:white;stroke:#111;stroke-width:1.5}.line{stroke:#111;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#111;stroke-width:1.5;fill:none;stroke-dasharray:4 4}</style></defs>
  <rect x="24" y="24" width="1252" height="472" fill="white" stroke="#111" stroke-width="2"/>
  <text x="55" y="70" class="title">Process-video form: search before selection</text>
  <text x="55" y="100" class="body">The moving-image output shows traversal, rejection, sampling, assembly, and commemoration rather than only a final image.</text>
  <g transform="translate(55,155)"><rect width="190" height="190" class="frame"/><rect x="28" y="42" width="134" height="84" class="screen"/><path d="M42 67 L148 67 M42 89 L148 89 M42 111 L148 111" class="dash"/><text x="28" y="160" class="label">1. Search scan</text><text x="28" y="180" class="body">candidate images pass rapidly</text></g>
  <g transform="translate(290,155)"><rect width="190" height="190" class="frame"/><rect x="28" y="42" width="134" height="84" class="screen"/><path d="M48 54 L142 120 M142 54 L48 120" stroke="#111" stroke-width="3"/><text x="28" y="160" class="label">2. Rejection</text><text x="28" y="180" class="body">unsuitable material is visible</text></g>
  <g transform="translate(525,155)"><rect width="190" height="190" class="frame"/><rect x="28" y="42" width="134" height="84" class="screen"/><rect x="52" y="58" width="36" height="26" fill="#ddd" stroke="#111"/><rect x="108" y="87" width="28" height="24" fill="#ddd" stroke="#111"/><text x="28" y="160" class="label">3. Sampling</text><text x="28" y="180" class="body">fragments are selected</text></g>
  <g transform="translate(760,155)"><rect width="190" height="190" class="frame"/><rect x="28" y="42" width="134" height="84" class="screen"/><circle cx="95" cy="84" r="45" fill="none" stroke="#111" stroke-width="2"/><rect x="54" y="52" width="22" height="22" fill="#ddd" stroke="#111"/><rect x="89" y="86" width="24" height="18" fill="#ddd" stroke="#111"/><rect x="116" y="61" width="18" height="24" fill="#ddd" stroke="#111"/><text x="28" y="160" class="label">4. Assembly</text><text x="28" y="180" class="body">the portrait appears as fragments</text></g>
  <g transform="translate(995,155)"><rect width="190" height="190" class="frame"/><rect x="28" y="42" width="134" height="84" class="screen"/><text x="55" y="75" class="body">Name</text><text x="55" y="98" class="body">Dates</text><path d="M48 113 L142 113" stroke="#111"/><text x="28" y="160" class="label">5. Outro</text><text x="28" y="180" class="body">commemorative context returns</text></g>
  <line x1="250" y1="250" x2="285" y2="250" class="line"/><line x1="485" y1="250" x2="520" y2="250" class="line"/><line x1="720" y1="250" x2="755" y2="250" class="line"/><line x1="955" y1="250" x2="990" y2="250" class="line"/>
  <text x="55" y="430" class="body">Figure logic: the process video prevents the final portrait from appearing as an autonomous computational revelation.</text>
</svg>
