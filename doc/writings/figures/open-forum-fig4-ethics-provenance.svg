<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="650" viewBox="0 0 1300 650" role="img" aria-label="Ethics and provenance model">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#111" /></marker><style>.title{font-family:Arial,Helvetica,sans-serif;font-size:30px;font-weight:700;fill:#111}.label{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#111}.body{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#111}.small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#111}.box{fill:#f8f8f8;stroke:#111;stroke-width:2;rx:14;ry:14}.gate{fill:#fff;stroke:#111;stroke-width:2;stroke-dasharray:7 5;rx:14;ry:14}.risk{fill:#efefef;stroke:#111;stroke-width:2;rx:14;ry:14}.line{stroke:#111;stroke-width:2;fill:none;marker-end:url(#arrow)}.bar{stroke:#111;stroke-width:3;stroke-dasharray:10 6}</style></defs>
  <rect x="24" y="24" width="1252" height="602" fill="white" stroke="#111" stroke-width="2"/>
  <text x="55" y="70" class="title">Ethics and provenance model</text>
  <text x="55" y="100" class="body">A responsible memorial system separates historical targets, source fields, generated outputs, review states, and release conditions.</text>
  <rect x="70" y="160" width="240" height="120" class="box"/><text x="100" y="195" class="label">Historical target images</text><text x="100" y="225" class="body">public archival source</text><text x="100" y="248" class="small">name, dates, provenance, restrictions</text>
  <rect x="70" y="375" width="240" height="120" class="box"/><text x="100" y="410" class="label">Visual source field</text><text x="100" y="440" class="body">place imagery first</text><text x="100" y="463" class="small">people-source work remains internal</text>
  <rect x="380" y="260" width="240" height="120" class="gate"/><text x="410" y="295" class="label">Exclusion and review</text><text x="410" y="325" class="body">sensitive contexts removed</text><text x="410" y="348" class="small">source limits, opt-out, deletion</text>
  <rect x="690" y="260" width="240" height="120" class="box"/><text x="720" y="295" class="label">Generated outputs</text><text x="720" y="325" class="body">still image + process video</text><text x="720" y="348" class="small">sidecar metadata and review state</text>
  <rect x="1000" y="160" width="230" height="120" class="risk"/><text x="1030" y="195" class="label">Public release</text><text x="1030" y="225" class="body">place-fragment outputs</text><text x="1030" y="248" class="small">after review and contextualisation</text>
  <rect x="1000" y="375" width="230" height="120" class="risk"/><text x="1030" y="410" class="label">Legal-review boundary</text><text x="1030" y="440" class="body">person-fragment outputs</text><text x="1030" y="463" class="small">not public before review</text>
  <line x1="310" y1="220" x2="390" y2="290" class="line"/><line x1="310" y1="435" x2="390" y2="350" class="line"/><line x1="620" y1="320" x2="690" y2="320" class="line"/><line x1="930" y1="305" x2="1000" y2="230" class="line"/><line x1="930" y1="335" x2="1000" y2="440" class="line"/>
  <line x1="970" y1="130" x2="970" y2="535" class="bar"/><text x="940" y="570" class="body">boundary between reviewed place work and higher-risk person-source work</text>
</svg>
